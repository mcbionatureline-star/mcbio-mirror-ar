<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Specchio Virtuale Professionale</title>
<style>
body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
video { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); filter: brightness(1.15) contrast(1.05) saturate(1.1); }
.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 10px solid rgba(255,255,255,0.1); pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
.header { margin-top: 40px; color: white; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; text-align: center; }
.footer { margin-bottom: 50px; color: white; font-size: 12px; text-align: center; opacity: 0.8; }
</style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<div class="overlay">
<div class="header">ANALISI DIGITALE PELLE</div>
<div class="footer">SIMULAZIONE POST-TRATTAMENTO
Specchio Attivo</div>
</div>
<script>
const v = document.getElementById('video');
navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:false})
.then(s=>{v.srcObject=s;}).catch(e=>{alert("Attiva fotocamera");});
</script>
</body>
</html>
